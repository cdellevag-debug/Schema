<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Schema</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;--s1:#0d0d0d;--s2:#1a1a1a;--bd:#2a2a2a;
  --ac:#e8a838;--tx:#e6edf3;--mu:#7d8590;--re:#f85149;
  --dc:#fbbf24;--db:rgba(251,191,36,.13);--dbr:rgba(251,191,36,.5);
  --kc:#fb923c;--kb:rgba(251,146,60,.13);--kbr:rgba(251,146,60,.5);
  --nc:#818cf8;--nb:rgba(129,140,248,.13);--nbr:rgba(129,140,248,.5);
  --lc:#34d399;--lb:rgba(52,211,153,.10);--lbr:rgba(52,211,153,.45);
  --oc:#a78bfa;--ob:rgba(167,139,250,.10);--obr:rgba(167,139,250,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace,system-ui;font-size:15px}
#wrap{display:flex;flex-direction:column;height:100vh;background:#000}
#hdr{background:#000;border-bottom:1px solid var(--bd);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Syne',system-ui;font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--ac)}
.ibtn{width:38px;height:38px;border-radius:8px;border:1px solid var(--bd);background:var(--s1);color:var(--mu);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
#nav{background:#000;border-bottom:1px solid var(--bd);display:flex;flex-shrink:0}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 2px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent}
.ni{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--mu)}.nt.on .ni{color:var(--ac)}
.nl{font-size:9px;text-transform:uppercase;color:var(--mu);letter-spacing:.3px;white-space:nowrap}
.nt.on{border-color:var(--ac)}.nt.on .nl{color:var(--ac)}
#body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;background:#000}
.pg{display:none}.pg.on{display:block}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;border:1px solid}
.bd{background:var(--db);color:var(--dc);border-color:var(--dbr)}
.bk{background:var(--kb);color:var(--kc);border-color:var(--kbr)}
.bn{background:var(--nb);color:var(--nc);border-color:var(--nbr)}
.bl{background:var(--lb);color:var(--lc);border-color:var(--lbr)}
.bo{background:var(--ob);color:var(--oc);border-color:var(--obr)}
.sd{border-color:var(--dbr)!important;background:var(--db)!important}
.sk{border-color:var(--kbr)!important;background:var(--kb)!important}
.sn{border-color:var(--nbr)!important;background:var(--nb)!important}
.sl{border-color:var(--lbr)!important;background:var(--lb)!important}
.td{color:var(--dc)!important}.tk{color:var(--kc)!important}.tn{color:var(--nc)!important}.tl{color:var(--lc)!important}
.leg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.nc{border-radius:12px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid}
.nc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.nc.sd::before{background:linear-gradient(90deg,var(--dbr),var(--dc))}
.nc.sk::before{background:linear-gradient(90deg,var(--kbr),var(--kc))}
.nc.sn::before{background:linear-gradient(90deg,var(--nbr),var(--nc))}
.nxl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
.nxd{font-family:'Syne',system-ui;font-size:22px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
.nxt{font-size:24px;font-weight:500;margin-bottom:6px}
.nxm{font-size:13px;color:var(--mu);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.nxcd{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);font-size:13px;color:var(--mu)}
.cnum{font-family:'Syne',system-ui;font-size:18px;font-weight:700;color:var(--ac)}
.obar{background:var(--ob);border:1px solid var(--obr);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.slbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin:16px 0 8px}
.slist{display:flex;flex-direction:column;gap:7px}
.si{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.sif{flex:1;min-width:0}.sdy{font-size:12px;color:var(--mu);margin-bottom:2px}.stm{font-size:14px;font-weight:500}.snm{font-size:12px;color:var(--mu);margin-top:2px}.omini{font-size:12px;color:var(--oc);margin-top:2px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.cgrid{display:grid;grid-template-columns:26px repeat(7,1fr);gap:2px;width:100%}
.cwd,.cwnh{font-size:9px;text-transform:uppercase;color:var(--mu);text-align:center;padding:4px 0}
.cwnh{color:rgba(232,168,56,.5)}.cwn{font-size:9px;color:rgba(232,168,56,.4);text-align:center;display:flex;align-items:center;justify-content:center}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;gap:1px;border:1px solid transparent;min-width:0}
.cdn{font-size:12px;line-height:1}.cd.om .cdn{color:var(--bd)}
.cd.tdy .cdn{background:var(--ac);color:var(--bg);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600}
.cdd{background:var(--db);border-color:var(--dbr)}.cdk{background:var(--kb);border-color:var(--kbr)}
.cdn2{background:var(--nb);border-color:var(--nbr)}.cdl{background:var(--lb);border-color:var(--lbr)}
.clbl{font-size:7px;line-height:1;font-weight:600;text-transform:uppercase}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cm{font-family:'Syne',system-ui;font-size:20px;font-weight:700;letter-spacing:-.5px}
.cnav{display:flex;gap:8px}
.cbtn{width:36px;height:36px;border-radius:8px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.abtn{width:100%;padding:13px;border-radius:9px;border:1px dashed var(--bd);background:transparent;color:var(--mu);font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.mg{margin-bottom:20px}
.mh{font-family:'Syne',system-ui;font-size:15px;font-weight:700;color:var(--ac);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:baseline}
.pi{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 13px;display:flex;align-items:flex-start;gap:9px;margin-bottom:7px}
.pi.past{opacity:.45}.pif{flex:1;min-width:0}.pdy{font-size:12px;color:var(--mu);margin-bottom:2px}
.ptm{font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px}
.pnt{font-size:12px;color:var(--mu);margin-top:2px}.pob{font-size:12px;color:var(--oc);margin-top:4px}
.pact{display:flex;gap:5px;flex-shrink:0}
.actb{width:32px;height:32px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--mu);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.iz{border:2px dashed var(--bd);border-radius:12px;padding:28px 16px;text-align:center;margin-bottom:16px}
.iico{font-size:34px;margin-bottom:10px}
.iti{font-family:'Syne',system-ui;font-size:17px;font-weight:700;margin-bottom:5px}
.isu{font-size:13px;color:var(--mu);line-height:1.6;margin-bottom:14px}
.ifi{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.ifc{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:12px 13px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.imt{color:var(--mu);font-size:11px;margin-top:3px}
.sgrd{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:13px;text-align:center}
.sn2{font-family:'Syne',system-ui;font-size:24px;font-weight:700;color:var(--ac)}.sn2.o{color:var(--oc)}
.slb2{font-size:10px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
#fili{display:none}
.nadd{width:100%;padding:13px;border-radius:9px;border:1px dashed var(--bd);background:transparent;color:var(--mu);font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.ncard{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;cursor:pointer;position:relative;margin-bottom:10px}
.nctit{font-family:'Syne',system-ui;font-size:15px;font-weight:700;margin-bottom:5px;padding-right:26px}
.ncpre{font-size:12px;color:var(--mu);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ncdt{font-size:11px;color:var(--bd);margin-top:7px}
.ncdel{position:absolute;top:11px;right:11px;background:none;border:none;color:var(--bd);cursor:pointer;font-size:18px;padding:4px;line-height:1}
.trow{display:flex;gap:8px;margin-bottom:16px}
.tinp{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:12px 13px;color:var(--tx);font-family:inherit;font-size:14px;outline:none}
.tinp:focus{border-color:var(--ac)}.tinp::placeholder{color:var(--mu)}
.tadd{padding:12px 14px;border-radius:9px;border:none;background:var(--ac);color:#0d1117;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
.tsec{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
.tlist{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.ti{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:12px 13px;display:flex;align-items:center;gap:10px}
.ti.dn{opacity:.5}
.tchk{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px}
.tchk.on{background:var(--lc);border-color:var(--lc);color:#0d1117}
.ttxt{flex:1;font-size:14px;line-height:1.4}.ti.dn .ttxt{text-decoration:line-through;color:var(--mu)}
.tdel{background:none;border:none;color:var(--bd);cursor:pointer;font-size:17px;padding:3px;flex-shrink:0}
.ov{display:none;position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.82);align-items:flex-end}
.ov.open{display:flex}
.sheet{background:var(--s1);border-radius:18px 18px 0 0;padding:20px 18px 40px;width:100%;max-height:85%;overflow-y:auto}
.shdl{width:40px;height:4px;border-radius:2px;background:var(--bd);margin:0 auto 18px}
.shti{font-family:'Syne',system-ui;font-size:19px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:13px}
.fl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;display:block}
.fi,.fta{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:12px 13px;color:var(--tx);font-family:inherit;font-size:14px;outline:none;-webkit-appearance:none}
.fi:focus,.fta:focus{border-color:var(--ac)}.fta{resize:none;height:120px;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fbts{display:flex;gap:8px;margin-top:16px}
.btn{display:flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;flex:1}
.ba{background:var(--ac);color:#0d1117}.bg2{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.brd{background:rgba(248,81,73,.12);color:var(--re);border:1px solid rgba(248,81,73,.3)}
.mdt{font-family:'Syne',system-ui;font-size:19px;font-weight:700;margin-bottom:12px}
.mev{border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid}
.mevh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;flex-wrap:wrap}
.mevtm{font-size:21px;font-weight:500;margin-bottom:4px}.mevm{font-size:12px;color:var(--mu)}
.mevob{font-size:13px;color:var(--oc);margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,.06)}
.mevobr{display:flex;justify-content:space-between;font-size:12px;margin-top:4px;color:var(--mu)}
.mevobr span:last-child{color:var(--oc);font-weight:500}
.meva{display:flex;gap:7px;margin-top:10px}
.empty{text-align:center;padding:46px 16px;color:var(--mu);font-size:14px;line-height:1.8}
.emico{font-size:40px;margin-bottom:12px;opacity:.5}
.cmsg{font-size:14px;color:var(--mu);line-height:1.6;margin-bottom:16px}
</style>
</head>
<body>

  <div id="hdr">
    <div class="logo">Schema</div>

  </div>

<script>
var ev=[],no=[],td2=[],calMo=new Date(),cur='dash',eSid=null,eNid=null;
calMo.setDate(1);
var DL=['S\u00f6ndag','M\u00e5ndag','Tisdag','Onsdag','Torsdag','Fredag','L\u00f6rdag'];
var DS=['S\u00f6n','M\u00e5n','Tis','Ons','Tor','Fre','L\u00f6r'];
var MN=['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
var MS=['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

function sg(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadAll(){ev=sg('sch_ev',[]);no=sg('sch_no',[]);td2=sg('sch_td',[]);}
function saveEv(){ss('sch_ev',ev);}
function saveNo(){ss('sch_no',no);}
function saveTd(){ss('sch_td',td2);}

function easter(y){var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);return new Date(y,Math.floor((h+l-7*m+114)/31)-1,((h+l-7*m+114)%31)+1);}
function addD(dt,n){var d=new Date(dt);d.setDate(d.getDate()+n);return d;}
function mids(y){var d=new Date(y,5,20);while(d.getDay()!==6)d.setDate(d.getDate()+1);return d;}
function dSame(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function isHol(dt){var y=dt.getFullYear(),m=dt.getMonth()+1,d=dt.getDate();if([[1,1],[1,6],[5,1],[6,6],[12,25],[12,26]].some(function(p){return p[0]===m&&p[1]===d;}))return true;var e=easter(y);if([0,-2,1,39,49].some(function(n){return dSame(dt,addD(e,n));}))return true;if(dSame(dt,mids(y)))return true;var ah=new Date(y,9,31);while(ah.getDay()!==6)ah.setDate(ah.getDate()+1);return dSame(dt,ah);}
function nxtVd(dt){var n=addD(dt,1);while(n.getDay()===0||n.getDay()===6||isHol(n))n=addD(n,1);return n;}
function mk(y,m,d,h,i){return new Date(y,m,d,h,i).getTime();}
function obRate(t){
  var d=new Date(t),y=d.getFullYear(),mo=d.getMonth(),dd=d.getDate(),h=d.getHours(),w=d.getDay();
  var md=mids(y),me=addD(md,-1);
  if(t>=mk(me.getFullYear(),me.getMonth(),me.getDate(),12,0)&&t<mk(md.getFullYear(),md.getMonth(),md.getDate(),12,0))return 200;
  if(t>=mk(y,11,24,12,0)&&t<mk(y,11,25,12,0))return 200;
  if(t>=mk(y,11,31,12,0)&&t<mk(y+1,0,1,12,0))return 200;
  if(t>=mk(y-1,11,31,12,0)&&t<mk(y,0,1,12,0))return 200;
  var e=easter(y),gf=addD(e,-2),em=addD(e,1),dG=addD(gf,-1),dE=addD(em,1);
  if(t>=mk(dG.getFullYear(),dG.getMonth(),dG.getDate(),22,0)&&t<mk(dE.getFullYear(),dE.getMonth(),dE.getDate(),3,0))return 120;
  var m1=addD(me,-1),m2=addD(md,1);
  if(t>=mk(m1.getFullYear(),m1.getMonth(),m1.getDate(),22,0)&&t<mk(m2.getFullYear(),m2.getMonth(),m2.getDate(),3,0))return 120;
  if(t>=mk(y,11,23,22,0)&&t<mk(y,11,27,3,0))return 120;
  if(t>=mk(y-1,11,23,22,0)&&t<mk(y-1,11,27,3,0))return 120;
  if(t>=mk(y,11,30,22,0)&&t<mk(y+1,0,2,3,0))return 120;
  if(t>=mk(y-1,11,30,22,0)&&t<mk(y,0,2,3,0))return 120;
  if(w===5&&h>=22)return 120;if(w===6&&h<3)return 120;if(w===6&&h>=22)return 120;if(w===0&&h<3)return 120;
  if(h>=3&&h<6)return 120;
  for(var off=-2;off<=2;off++){var tr=new Date(y,mo,dd+off);if(isHol(tr)||tr.getDay()===6){var e2=new Date(tr.getFullYear(),tr.getMonth(),tr.getDate()-1,22,0);var nv=nxtVd(tr),en=new Date(nv.getFullYear(),nv.getMonth(),nv.getDate(),3,0);if(t>=e2.getTime()&&t<en.getTime())return 90;}}
  if(w>=1&&w<=5&&h>=19&&h<22)return 60;

}
function calcOB(s,e){if(!s||!e||e<=s)return{total:0,A:0,B:0,C:0,D:0};var CH=900000,A=0,B=0,C=0,D=0,t=s;while(t<e){var ce=Math.min(t+CH,e),hr=(ce-t)/3600000,r=obRate(t+(ce-t)/2);if(r===200)A+=r*hr;else if(r===120)B+=r*hr;else if(r===90)C+=r*hr;else if(r===60)D+=r*hr;t=ce;}return{total:Math.round(A+B+C+D),A:Math.round(A),B:Math.round(B),C:Math.round(C),D:Math.round(D)};}

  var t=(e.title||'').toLowerCase();
  if(t.indexOf('fridag')>=0||t.indexOf('ledig')>=0||t.indexOf('fr\u00e5nvaro')>=0)return true;

  return s.getHours()===0&&s.getMinutes()===0&&en&&en.getHours()===0&&en.getMinutes()===0;
}

function evOn(y,m,d){return ev.filter(function(e){if(!e.start)return false;var s=new Date(e.start.ts);return s.getFullYear()===y&&s.getMonth()===m&&s.getDate()===d;});}

function parseICS(txt){
  var out=[],lines=txt.replace(/\r\n /g,'').replace(/\r\n\t/g,'').split(/\r?\n/),inE=false,cur={};
  for(var i=0;i<lines.length;i++){var ln=lines[i];if(ln==='BEGIN:VEVENT'){inE=true;cur={};continue;}if(ln==='END:VEVENT'){if(cur.start)out.push(cur);inE=false;continue;}if(!inE)continue;var ci=ln.indexOf(':');if(ci<0)continue;var key=ln.substring(0,ci).split(';')[0].toUpperCase(),val=ln.substring(ci+1).trim();if(key==='DTSTART')cur.start=pDT(val,ln.substring(0,ci));else if(key==='DTEND')cur.end=pDT(val,ln.substring(0,ci));else if(key==='SUMMARY')cur.title=val.replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/g,'\n');else if(key==='UID')cur.uid=val;}
  return out;
}
function pDT(val,fk){val=val.trim();var ad=fk.indexOf('VALUE=DATE')>=0||val.length===8;if(ad){var y=+val.substr(0,4),m=+val.substr(4,2)-1,d=+val.substr(6,2);return{allday:true,ts:new Date(y,m,d).getTime()};}var y=+val.substr(0,4),mo=+val.substr(4,2)-1,d=+val.substr(6,2),h=+val.substr(9,2),mi=+val.substr(11,2);return{allday:false,ts:val.slice(-1)==='Z'?Date.UTC(y,mo,d,h,mi):new Date(y,mo,d,h,mi).getTime()};}

function pgImp(){

  var work=ev.filter(function(e){return !isOff(e);}),off=ev.filter(function(e){return isOff(e);}).length;
  var hrs=Math.round(work.reduce(function(s,e){var h=dH(e.start,e.end);return s+(h?+h:0);},0)),tot=totOB();
  var fhtml=files.length?files.map(function(f,i){return'<div class="ifc"><div><div>'+f.name+'</div><div class="imt">'+f.count+' poster &middot; '+f.date+'</div></div><button onclick="delFile('+i+')" style="background:none;border:none;color:var(--mu);cursor:pointer;font-size:20px;padding:4px">&#10005;</button></div>';}).join(''):'<div style="color:var(--mu);font-size:13px;text-align:center;padding:12px 0">Inga filer importerade \u00e4n.</div>';
  var stats=ev.length?'<div class="sgrd"><div class="sc"><div class="sn2">'+work.length+'</div><div class="slb2">Arbetspass</div></div><div class="sc"><div class="sn2">'+off+'</div><div class="slb2">Lediga</div></div><div class="sc"><div class="sn2">'+hrs+'</div><div class="slb2">Timmar</div></div><div class="sc"><div class="sn2 o">'+tot.toLocaleString('sv-SE')+'</div><div class="slb2">Kr OB</div></div></div>':'';
  document.getElementById('pg-imp').innerHTML='<div class="iz"><div class="iico">&#128194;</div><div class="iti">Importera ICS-fil</div><div class="isu">Exportera ditt schema fr\u00e5n Heroma.<br>All data stannar p\u00e5 din enhet &mdash; inget skickas n\u00e5gonstans.</div><label class="btn ba" for="fili" style="cursor:pointer;display:flex;width:auto">V\u00e4lj .ics-fil</label></div><div class="slbl">Importerade filer</div><div class="ifi">'+fhtml+'</div>'+stats;
}
function handleFiles(fl){
  Array.from(fl).forEach(function(file){if(file.name.indexOf('.ics')<0)return;var r=new FileReader();r.onload=function(e){var txt=e.target.result,parsed=parseICS(txt),files=sg('sch_fi',[]),idx=-1;for(var i=0;i<files.length;i++){if(files[i].name===file.name){idx=i;break;}}var entry={name:file.name,count:parsed.length,date:new Date().toLocaleDateString('sv-SE')};if(idx>=0)files[idx]=entry;else files.push(entry);ss('sch_fi',files);var manual=ev.filter(function(e){return e.manual;});var others=ev.filter(function(e){return !e.manual&&e.srcFile!==file.name;});var newEv=parsed.map(function(e){return Object.assign({},e,{id:e.uid||uid(),srcFile:file.name});});ev=manual.concat(others).concat(newEv);ev.sort(function(a,b){return a.start.ts-b.start.ts;});saveEv();pgImp();refresh();};r.readAsText(file);});
}
function delFile(idx){var files=sg('sch_fi',[]),name=files[idx]?files[idx].name:'';files.splice(idx,1);ss('sch_fi',files);if(name)ev=ev.filter(function(e){return e.manual||e.srcFile!==name;});saveEv();pgImp();refresh();}

function pgNotes(){
  var sorted=no.slice().sort(function(a,b){return b.updated-a.updated;});
  var h='<button class="nadd" onclick="openNM(null)">+ Ny anteckning</button>';
  if(!sorted.length)h+='<div class="empty"><div class="emico">&#128221;</div>Inga anteckningar.</div>';
  else h+=sorted.map(function(n){var nid=n.id;return'<div class="ncard" onclick="openNM(\''+nid+'\')"><button class="ncdel" onclick="event.stopPropagation();confDel(\'note\',\''+nid+'\')">&#10005;</button><div class="nctit">'+(n.title||'Utan rubrik')+'</div><div class="ncpre">'+(n.body||'').replace(/</g,'&lt;')+'</div><div class="ncdt">'+new Date(n.updated).toLocaleDateString('sv-SE')+'</div></div>';}).join('');
  document.getElementById('pg-notes').innerHTML=h;
}
function openNM(id){
  eNid=id;
  document.getElementById('mntt').textContent=id?'Redigera':'Ny anteckning';
  if(id){var n=null;for(var i=0;i<no.length;i++){if(no[i].id===id){n=no[i];break;}}document.getElementById('nti').value=n?n.title||'':'';document.getElementById('nbo').value=n?(n.body||''):'';}
  else{document.getElementById('nti').value='';document.getElementById('nbo').value='';}
  openM('m-note');setTimeout(function(){document.getElementById('nbo').focus();},300);
}
document.getElementById('nsave').onclick=function(){
  var ti=document.getElementById('nti').value.trim(),bo=document.getElementById('nbo').value.trim(),found=false;
  if(eNid){for(var i=0;i<no.length;i++){if(no[i].id===eNid){no[i]=Object.assign({},no[i],{title:ti,body:bo,updated:Date.now()});found=true;break;}}}
  if(!found)no.push({id:uid(),title:ti,body:bo,updated:Date.now()});
  saveNo();closeM();pgNotes();
};

function pgTodo(){
  var act=td2.filter(function(t){return !t.done;}),dn=td2.filter(function(t){return t.done;});
  var h='<div class="trow"><input class="tinp" id="tnew" placeholder="Ny uppgift..."><button class="tadd" onclick="addT()">L\u00e4gg till</button></div>';
  if(!act.length&&!dn.length)h+='<div class="empty"><div class="emico">&#9989;</div>Inga uppgifter.</div>';
  if(act.length)h+='<div class="tsec">Att g\u00f6ra ('+act.length+')</div><div class="tlist">'+act.map(trow).join('')+'</div>';
  if(dn.length)h+='<div class="tsec">Klart ('+dn.length+')</div><div class="tlist">'+dn.map(trow).join('')+'</div>';
  document.getElementById('pg-todo').innerHTML=h;
  var inp=document.getElementById('tnew');if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter')addT();});
}
function trow(t){var tid=t.id;return'<div class="ti'+(t.done?' dn':'')+'"><div class="tchk'+(t.done?' on':'')+'" onclick="togT(\''+tid+'\')">'+(t.done?'&#10003;':'')+'</div><div class="ttxt">'+t.text.replace(/</g,'&lt;')+'</div><button class="tdel" onclick="delT(\''+tid+'\')">&#10005;</button></div>';}
function addT(){var inp=document.getElementById('tnew'),txt=inp?inp.value.trim():'';if(!txt)return;td2.unshift({id:uid(),text:txt,done:false});saveTd();if(inp)inp.value='';pgTodo();setTimeout(function(){var e=document.getElementById('tnew');if(e)e.focus();},50);}
function togT(id){for(var i=0;i<td2.length;i++){if(td2[i].id===id){td2[i].done=!td2[i].done;break;}}saveTd();pgTodo();}
function delT(id){td2=td2.filter(function(t){return t.id!==id;});saveTd();pgTodo();}

function confDel(type,id){
  document.getElementById('mct').textContent=type==='shift'?'Ta bort pass':'Ta bort anteckning';
  document.getElementById('mcm').textContent='Det g\u00e5r inte att \u00e5ngra.';
  document.getElementById('mcok').onclick=function(){if(type==='shift'){ev=ev.filter(function(e){return e.id!==id;});saveEv();refresh();}else{no=no.filter(function(n){return n.id!==id;});saveNo();pgNotes();}closeM();};
  openM('m-confirm');
}

var PAGES={dash:pgDash,cal:pgCal,list:pgList,imp:pgImp,notes:pgNotes,todo:pgTodo};
function goTo(name){cur=name;document.querySelectorAll('.nt').forEach(function(t){t.classList.toggle('on',t.dataset.p===name);});document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});document.getElementById('pg-'+name).classList.add('on');document.getElementById('body').scrollTop=0;if(PAGES[name])PAGES[name]();}
function refresh(){if(PAGES[cur])PAGES[cur]();}
document.querySelectorAll('.nt').forEach(function(t){t.addEventListener('click',function(){goTo(t.dataset.p);});});
document.getElementById('todayb').addEventListener('click',function(){var t=tod();calMo=new Date(t.y,t.m,1);goTo('cal');});
document.getElementById('fili').addEventListener('change',function(e){handleFiles(e.target.files);e.target.value='';});

loadAll();
pgDash();
</script>
</body>
</html>
